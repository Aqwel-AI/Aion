# Aion Former training config — small transformer on text

model:
  vocab_size: 256   # set from dataset after tokenizer build
  embedding_dim: 128
  num_heads: 4
  num_layers: 2
  max_seq_len: 64
  hidden_dim: 512

training:
  batch_size: 32
  lr: 0.001
  epochs: 10
  steps_per_epoch: 50

data:
  seq_length: 64
  level: char

# Optional: path to text file
# data_file: data/shakespeare.txt
