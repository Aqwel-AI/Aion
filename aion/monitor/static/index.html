<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aion · Hardware dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --border: #2d3a4d;
      --text: #e7edf4;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --green: #3ecf8e;
      --amber: #f5a524;
      --red: #f14c4c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }
    h1 { font-size: 1.25rem; font-weight: 600; margin: 0; }
    .sub { color: var(--muted); font-size: 0.85rem; margin-top: 0.25rem; }
    .toggle {
      display: inline-flex;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .toggle button {
      background: transparent;
      color: var(--muted);
      border: none;
      padding: 0.45rem 1rem;
      cursor: pointer;
      font-size: 0.875rem;
    }
    .toggle button.active {
      background: var(--accent);
      color: #fff;
    }
    .status { font-size: 0.8rem; color: var(--muted); }
    main {
      padding: 1rem;
      max-width: 1600px;
      margin: 0 auto;
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(12, 1fr);
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.1rem;
      grid-column: span 12;
    }
    @media (min-width: 900px) {
      .card.span-6 { grid-column: span 6; }
      .card.span-4 { grid-column: span 4; }
    }
    .card h2 {
      margin: 0 0 0.75rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .metrics-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem;
      margin-bottom: 0.75rem;
      font-size: 0.9rem;
    }
    .metrics-row strong { color: var(--text); }
    .chart-wrap { position: relative; height: 220px; }
    .chart-wrap.tall { height: 260px; }
    .chart-wrap.short { height: 180px; }
    .cores-wrap { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 0.5rem; }
    .core-pill {
      font-size: 0.75rem;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      background: #243044;
      border: 1px solid var(--border);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    th, td {
      text-align: left;
      padding: 0.45rem 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    th { color: var(--muted); font-weight: 500; }
    tr:hover td { background: rgba(61, 139, 253, 0.06); }
    .cmd { max-width: 420px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); }
    .warn { color: var(--amber); font-size: 0.85rem; padding: 0.5rem 0; }
    .gpu-grid { display: grid; gap: 1rem; }
    @media (min-width: 700px) {
      .gpu-grid { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    }
    .gpu-stat { font-size: 0.85rem; margin-top: 0.35rem; }
    .gpu-stat span { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Hardware dashboard</h1>
      <div class="sub">Live CPU (overall + per-core), RAM, disk I/O, NVIDIA GPU, process memory · history 1 or 5 minutes</div>
    </div>
    <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
      <div class="toggle" id="winToggle" role="group" aria-label="History window">
        <button type="button" data-win="60" class="active">1 min</button>
        <button type="button" data-win="300">5 min</button>
      </div>
      <span class="status" id="status">Connecting…</span>
    </div>
  </header>
  <main>
    <div class="card span-6">
      <h2>CPU usage</h2>
      <div class="metrics-row" id="cpuSummary"></div>
      <div class="chart-wrap"><canvas id="chartCpu"></canvas></div>
    </div>
    <div class="card span-6">
      <h2>RAM usage</h2>
      <div class="metrics-row" id="ramSummary"></div>
      <div class="chart-wrap"><canvas id="chartRam"></canvas></div>
    </div>
    <div class="card span-6">
      <h2>Disk I/O</h2>
      <div class="metrics-row" id="diskSummary"></div>
      <div class="chart-wrap"><canvas id="chartDisk"></canvas></div>
    </div>
    <div class="card span-6" id="gpuCard">
      <h2>GPU (NVIDIA)</h2>
      <div id="gpuWarn" class="warn" hidden></div>
      <div class="gpu-grid" id="gpuCharts"></div>
    </div>
    <div class="card span-6">
      <h2>Per-core CPU (now)</h2>
      <div class="cores-wrap" id="corePills"></div>
      <div class="chart-wrap short"><canvas id="chartCores"></canvas></div>
    </div>
    <div class="card span-6">
      <h2>Top memory processes</h2>
      <p class="sub" style="margin:0 0 0.75rem;">Useful to spot heavy Python / model workers (RSS)</p>
      <div style="overflow-x:auto;">
        <table>
          <thead><tr><th>PID</th><th>Name</th><th>RSS</th><th>Command</th></tr></thead>
          <tbody id="procBody"></tbody>
        </table>
      </div>
    </div>
  </main>
  <script>
(function () {
  const PALETTE = ['#3d8bfd', '#3ecf8e', '#f5a524', '#c084fc', '#f472b6', '#22d3ee'];

  let windowSec = 60;
  let lastNGpu = -1;
  let charts = { cpu: null, ram: null, disk: null, cores: null, gpuUtil: null, gpuVram: null };

  function fmtBytes(n) {
    if (n == null || isNaN(n)) return '—';
    const u = ['B', 'KB', 'MB', 'GB', 'TB'];
    let i = 0;
    let v = n;
    while (v >= 1024 && i < u.length - 1) { v /= 1024; i++; }
    return (i === 0 ? v : v.toFixed(i > 2 ? 2 : 1)) + ' ' + u[i];
  }

  function sliceHistory(history, sec) {
    if (!history || !history.length) return [];
    const need = Math.min(sec, history.length);
    return history.slice(-need);
  }

  function chartDefaults() {
    return {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#8b9cb3' } },
        tooltip: {
          backgroundColor: '#1a2332',
          titleColor: '#e7edf4',
          bodyColor: '#c5d0de',
          borderColor: '#2d3a4d',
          borderWidth: 1
        }
      },
      scales: {
        x: {
          ticks: { color: '#8b9cb3', maxTicksLimit: 8 },
          grid: { color: 'rgba(45,58,77,0.5)' }
        },
        y: {
          beginAtZero: true,
          ticks: { color: '#8b9cb3' },
          grid: { color: 'rgba(45,58,77,0.5)' }
        }
      }
    };
  }

  function buildLineChart(ctx, label, color, yMax) {
    return new Chart(ctx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [{
          label,
          data: [],
          borderColor: color,
          backgroundColor: color + '33',
          fill: true,
          tension: 0.25,
          pointRadius: 0,
          borderWidth: 2
        }]
      },
      options: {
        ...chartDefaults(),
        scales: {
          ...chartDefaults().scales,
          y: { ...chartDefaults().scales.y, max: yMax }
        }
      }
    });
  }

  function initCharts() {
    const ctxCpu = document.getElementById('chartCpu').getContext('2d');
    const ctxRam = document.getElementById('chartRam').getContext('2d');
    const ctxDisk = document.getElementById('chartDisk').getContext('2d');
    const ctxCores = document.getElementById('chartCores').getContext('2d');

    charts.cpu = buildLineChart(ctxCpu, 'CPU %', '#3d8bfd', 100);
    charts.ram = buildLineChart(ctxRam, 'RAM %', '#3ecf8e', 100);
    charts.disk = new Chart(ctxDisk, {
      type: 'line',
      data: {
        labels: [],
        datasets: [
          { label: 'Read MB/s', data: [], borderColor: '#22d3ee', backgroundColor: '#22d3ee22', fill: true, tension: 0.25, pointRadius: 0, borderWidth: 2 },
          { label: 'Write MB/s', data: [], borderColor: '#f5a524', backgroundColor: '#f5a52422', fill: true, tension: 0.25, pointRadius: 0, borderWidth: 2 }
        ]
      },
      options: chartDefaults()
    });
    charts.cores = new Chart(ctxCores, {
      type: 'bar',
      data: { labels: [], datasets: [{ label: '%', data: [], backgroundColor: '#3d8bfdaa', borderColor: '#3d8bfd', borderWidth: 1 }] },
      options: {
        ...chartDefaults(),
        indexAxis: 'y',
        scales: {
          x: { ...chartDefaults().scales.x, max: 100, title: { display: true, text: '%', color: '#8b9cb3' } },
          y: { ...chartDefaults().scales.y, grid: { display: false } }
        }
      }
    });
  }

  function destroyGpuCharts() {
    const host = document.getElementById('gpuCharts');
    host.innerHTML = '';
    charts.gpuUtil = null;
    charts.gpuVram = null;
  }

  function ensureGpuCharts(nGpu) {
    const host = document.getElementById('gpuCharts');
    if (nGpu === 0) {
      lastNGpu = 0;
      destroyGpuCharts();
      return;
    }
    if (charts.gpuUtil && lastNGpu === nGpu) return;
    lastNGpu = nGpu;
    destroyGpuCharts();

    const mk = (title, yMax) => {
      const wrap = document.createElement('div');
      wrap.className = 'card';
      wrap.style.cssText = 'background:#121a26;padding:0.75rem;border-radius:8px;border:1px solid var(--border);';
      const h = document.createElement('div');
      h.textContent = title;
      h.style.cssText = 'font-size:0.8rem;color:var(--muted);margin-bottom:0.5rem;';
      const c = document.createElement('canvas');
      c.height = 160;
      const box = document.createElement('div');
      box.className = 'chart-wrap short';
      box.appendChild(c);
      wrap.appendChild(h);
      wrap.appendChild(box);
      host.appendChild(wrap);
      return c.getContext('2d');
    };

    const uctx = mk('GPU utilization %', 100);
    const vctx = mk('GPU VRAM %', 100);
    const dsU = [];
    const dsV = [];
    for (let i = 0; i < nGpu; i++) {
      const c = PALETTE[i % PALETTE.length];
      dsU.push({
        label: 'GPU ' + i,
        data: [],
        borderColor: c,
        backgroundColor: c + '22',
        fill: true,
        tension: 0.25,
        pointRadius: 0,
        borderWidth: 2
      });
      dsV.push({
        label: 'GPU ' + i + ' VRAM',
        data: [],
        borderColor: c,
        backgroundColor: c + '18',
        fill: true,
        tension: 0.25,
        pointRadius: 0,
        borderWidth: 2
      });
    }
    charts.gpuUtil = new Chart(uctx, {
      type: 'line',
      data: { labels: [], datasets: dsU },
      options: { ...chartDefaults(), scales: { ...chartDefaults().scales, y: { ...chartDefaults().scales.y, max: 100 } } }
    });
    charts.gpuVram = new Chart(vctx, {
      type: 'line',
      data: { labels: [], datasets: dsV },
      options: { ...chartDefaults(), scales: { ...chartDefaults().scales, y: { ...chartDefaults().scales.y, max: 100 } } }
    });
  }

  function updateFromPayload(data) {
    const hist = data.history || [];
    const slice = sliceHistory(hist, windowSec);
    const labels = slice.map(p => {
      const d = new Date(p.t);
      return d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    });

    const latest = data.latest || (slice.length ? slice[slice.length - 1] : null);

    document.getElementById('status').textContent = 'Updated ' + new Date().toLocaleTimeString();

    if (latest) {
      document.getElementById('cpuSummary').innerHTML =
        '<span>Overall: <strong>' + latest.cpu.toFixed(1) + '%</strong></span>' +
        '<span>Cores: <strong>' + (latest.cpu_cores ? latest.cpu_cores.length : 0) + '</strong></span>';
      document.getElementById('ramSummary').innerHTML =
        '<span>Used: <strong>' + fmtBytes(latest.ram_used) + '</strong> / ' + fmtBytes(latest.ram_total) + '</span>' +
        '<span>Load: <strong>' + latest.ram_pct.toFixed(1) + '%</strong></span>';
      document.getElementById('diskSummary').innerHTML =
        '<span>Volume use: <strong>' + latest.disk_pct.toFixed(1) + '%</strong></span>' +
        '<span>Now: R <strong>' + latest.disk_read_mbps.toFixed(2) + '</strong> · W <strong>' + latest.disk_write_mbps.toFixed(2) + '</strong> MB/s</span>';

      const pills = document.getElementById('corePills');
      pills.innerHTML = '';
      (latest.cpu_cores || []).forEach((pct, i) => {
        const el = document.createElement('span');
        el.className = 'core-pill';
        el.textContent = 'Core ' + i + ': ' + pct.toFixed(0) + '%';
        pills.appendChild(el);
      });

      const coreLabels = (latest.cpu_cores || []).map((_, i) => 'Core ' + i);
      charts.cores.data.labels = coreLabels;
      charts.cores.data.datasets[0].data = latest.cpu_cores || [];
      charts.cores.update('none');
    }

    charts.cpu.data.labels = labels;
    charts.cpu.data.datasets[0].data = slice.map(p => p.cpu);
    charts.cpu.update('none');

    charts.ram.data.labels = labels;
    charts.ram.data.datasets[0].data = slice.map(p => p.ram_pct);
    charts.ram.update('none');

    charts.disk.data.labels = labels;
    charts.disk.data.datasets[0].data = slice.map(p => p.disk_read_mbps);
    charts.disk.data.datasets[1].data = slice.map(p => p.disk_write_mbps);
    charts.disk.update('none');

    const gw = document.getElementById('gpuWarn');
    const oldMeta = document.getElementById('gpuMeta');
    if (oldMeta) oldMeta.remove();
    const gpus = latest && Array.isArray(latest.gpus) ? latest.gpus : null;
    const nGpu = gpus ? gpus.length : 0;

    if (!latest) {
      gw.hidden = false;
      gw.textContent = 'Waiting for metrics…';
      destroyGpuCharts();
    } else if (nGpu === 0) {
      gw.hidden = false;
      gw.textContent = 'No NVIDIA GPU detected. On Linux/Windows with NVIDIA drivers, install nvidia-ml-py or ensure nvidia-smi is on PATH.';
      lastNGpu = 0;
      destroyGpuCharts();
    } else {
      gw.hidden = true;
      ensureGpuCharts(nGpu);
      if (charts.gpuUtil && charts.gpuVram) {
        charts.gpuUtil.data.labels = labels;
        charts.gpuVram.data.labels = labels;
        for (let g = 0; g < nGpu; g++) {
          charts.gpuUtil.data.datasets[g].data = slice.map(p => {
            const gg = (p.gpus || [])[g];
            return gg ? gg.util : null;
          });
          charts.gpuVram.data.datasets[g].data = slice.map(p => {
            const gg = (p.gpus || [])[g];
            if (!gg || !gg.mem_total) return null;
            return 100 * gg.mem_used / gg.mem_total;
          });
        }
        charts.gpuUtil.update('none');
        charts.gpuVram.update('none');
      }

      if (latest && latest.gpus && latest.gpus.length) {
        const box = document.createElement('div');
        box.id = 'gpuMeta';
        box.className = 'gpu-grid';
        box.style.marginTop = '0.75rem';
        latest.gpus.forEach((g, i) => {
          const d = document.createElement('div');
          d.className = 'gpu-stat';
          const temp = g.temp_c != null ? g.temp_c + '°C' : 'n/a';
          d.innerHTML = '<strong>GPU ' + i + '</strong> · ' + escapeHtml(g.name) + '<br><span>Util ' + g.util + '% · VRAM ' +
            fmtBytes(g.mem_used) + ' / ' + fmtBytes(g.mem_total) + ' · Temp ' + temp + '</span>';
          box.appendChild(d);
        });
        document.getElementById('gpuCard').appendChild(box);
      }
    }

    const tbody = document.getElementById('procBody');
    tbody.innerHTML = '';
    (data.processes || []).forEach(p => {
      const tr = document.createElement('tr');
      tr.innerHTML = '<td>' + p.pid + '</td><td>' + escapeHtml(p.name) + '</td><td>' + fmtBytes(p.rss) + '</td><td class="cmd" title="' + escapeAttr(p.cmdline) + '">' + escapeHtml(p.cmdline) + '</td>';
      tbody.appendChild(tr);
    });
  }

  function escapeHtml(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
  function escapeAttr(s) {
    if (!s) return '';
    return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
  }

  document.getElementById('winToggle').addEventListener('click', function (e) {
    const btn = e.target.closest('button[data-win]');
    if (!btn) return;
    windowSec = parseInt(btn.getAttribute('data-win'), 10);
    document.querySelectorAll('#winToggle button').forEach(b => b.classList.toggle('active', b === btn));
  });

  const SNAPSHOT_URL = new URL('../api/metrics/snapshot', window.location.href).href;

  async function tick() {
    try {
      const r = await fetch(SNAPSHOT_URL);
      if (!r.ok) throw new Error(r.status);
      const data = await r.json();
      updateFromPayload(data);
    } catch (e) {
      document.getElementById('status').textContent = 'Error: ' + e.message;
    }
  }

  initCharts();
  tick();
  setInterval(tick, 1000);
})();
  </script>
</body>
</html>
